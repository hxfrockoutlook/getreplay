name: Update Today Replay Data

on:
    schedule:
    # 每 30 分钟运行一次
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  fetch-today:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run fetch script for today
        run: npm start -- --days=1 --output=todayreplay.json

      - name: Commit and push if changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add todayreplay.json
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: update todayreplay.json"
          git push
