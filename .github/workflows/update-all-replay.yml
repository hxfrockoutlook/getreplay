name: Update All Replay Data

on:
  schedule:
    # 每天 UTC 4:05 和 16:05 运行（北京时间 12:05 和 次日 0:05）
    - cron: "5 4,16 * * *"
  workflow_dispatch:  # 允许手动触发

jobs:
  fetch-all:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run fetch script for all days
        run: npm start -- --days=3 --output=allreplay.json

      - name: Commit and push if changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add allreplay.json
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: update allreplay.json"
          git push
